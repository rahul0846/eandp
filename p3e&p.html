<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Email & Password Validator</title>
  <link rel="stylesheet" href="p3e&p.css">
</head>
<body>

  <div class="container">
    <h2>Email & Password Validator</h2>

    <form autocomplete="off" id="loginForm">

      <div class="form-group">
        <label for="email">Email:</label>
        <input type="text" id="email" placeholder="Enter your email">
        <small class="error" id="emailError"></small>
      </div>

      <div class="form-group">
        <label for="password">Password:</label>
        <input type="password" id="password" placeholder="Password must be in 4 Character">
        <small class="error" id="passwordError"></small>
      </div>

      <button type="submit">Validate</button>

    </form>

    <div id="resultMessage"></div>
  </div>

  <script src="p3e&p.js"></script>

</body>
</html>
